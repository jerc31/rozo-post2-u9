<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
  <h1>Dashboard</h1>
  <p>Bienvenido, <span th:text="${usuario.nombre}"></span></p>
  <p>Nombre: <span th:text="${usuario.nombre}"></span></p>
  <p>Correo: <span sec:authentication="name"></span></p>
  <p>Roles: <span th:text="${roles}"></span></p>

  <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">
    Panel de Administracion
  </a>

  <p sec:authorize="hasRole('USER')">
    Acceso de usuario estandar.
  </p>

  <form th:action="@{/logout}" method="post">
    <button type="submit">Cerrar Sesion</button>
  </form>
</body>
</html>
